# .github/workflows/ml-pipeline.yml
# 
# Comprehensive MLOps CI/CD Pipeline
# Triggers on: push to main, pull requests, manual dispatch
# 
# Pipeline stages:
# 1. Code quality checks and testing
# 2. Data validation and drift detection
# 3. Model training and evaluation
# 4. Model registry and versioning
# 5. Performance monitoring setup
# 6. Multi-service deployment (Flask, FastAPI, Streamlit)

name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger
    inputs:
      retrain_model:
        description: 'Force model retraining'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.12'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: telco-churn-app

jobs:
  # ==============================================
  # JOB 1: CODE QUALITY & TESTING
  # ==============================================
  quality-checks:
    runs-on: ubuntu-latest
    outputs:
      should-retrain: ${{ steps.check-data.outputs.retrain-needed }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for DVC

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Code formatting check (Black)
      run: black --check --diff .

    - name: Import sorting check (isort)
      run: isort --check-only --diff .

    - name: Linting (flake8)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Type checking (mypy)
      run: mypy src/ --ignore-missing-imports

    - name: Security scan (bandit)
      run: bandit -r src/ -f json -o security-report.json || true

    - name: Run unit tests
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=html
        
    - name: Upload test coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

    # ==============================================
    # DVC DATA VALIDATION
    # ==============================================
    - name: Setup DVC
      uses: iterative/setup-dvc@v1

    - name: Configure DVC remote (S3/GCS)
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        dvc remote modify myremote access_key_id $AWS_ACCESS_KEY_ID
        dvc remote modify myremote secret_access_key $AWS_SECRET_ACCESS_KEY

    - name: Pull latest data
      run: dvc pull

    - name: Data validation and drift detection
      id: check-data
      run: |
        python scripts/data_validation.py
        echo "retrain-needed=$(cat .retrain-flag)" >> $GITHUB_OUTPUT

  # ==============================================
  # JOB 2: MODEL TRAINING & EVALUATION
  # ==============================================
  model-training:
    runs-on: ubuntu-latest
    needs: quality-checks
    if: needs.quality-checks.outputs.should-retrain == 'true' || github.event.inputs.retrain_model == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install mlflow boto3

    - name: Setup DVC
      uses: iterative/setup-dvc@v1

    - name: Pull training data
      run: dvc pull data/telco_churn.csv

    - name: Configure MLflow
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_PASSWORD }}
      run: |
        export MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI
        export MLFLOW_EXPERIMENT_NAME="telco-churn-production"

    - name: Train model with MLflow tracking
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_EXPERIMENT_NAME: "telco-churn-production"
      run: |
        python train_with_mlflow.py

    - name: Model evaluation and comparison
      run: |
        python scripts/model_evaluation.py

    - name: Upload model artifacts to DVC
      run: |
        dvc add model/best_churn_model.joblib
        dvc add model/model_metadata.json
        dvc push

    - name: Commit DVC changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add model/best_churn_model.joblib.dvc model/model_metadata.json.dvc
        git commit -m "Update model artifacts [skip ci]" || exit 0
        git push

  # ==============================================
  # JOB 3: BUILD & TEST DOCKER IMAGES
  # ==============================================
  build-images:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    strategy:
      matrix:
        service: [flask-app, fastapi-app, streamlit-app]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==============================================
  # JOB 4: MODEL MONITORING SETUP
  # ==============================================
  monitoring-setup:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install monitoring dependencies
      run: |
        pip install evidently pandas mlflow

    - name: Generate monitoring reports
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python scripts/generate_monitoring_reports.py

    - name: Upload monitoring artifacts
      uses: actions/upload-artifact@v3
      with:
        name: monitoring-reports
        path: reports/

  # ==============================================
  # JOB 5: DEPLOYMENT
  # ==============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-images, quality-checks]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your deployment commands here
        # kubectl apply -f k8s/staging/
        # docker-compose -f docker-compose.staging.yml up -d

    - name: Run integration tests
      run: |
        python scripts/integration_tests.py

    - name: Deploy to production
      if: success()
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # kubectl apply -f k8s/production/
        # docker-compose -f docker-compose.prod.yml up -d

    - name: Setup monitoring alerts
      run: |
        python scripts/setup_alerts.py

  # ==============================================
  # JOB 6: POST-DEPLOYMENT VALIDATION
  # ==============================================
  post-deploy-validation:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Health check - Flask App
      run: |
        curl -f http://your-flask-app-url/health || exit 1

    - name: Health check - FastAPI
      run: |
        curl -f http://your-fastapi-url/health || exit 1

    - name: Health check - Streamlit
      run: |
        curl -f http://your-streamlit-url/ || exit 1

    - name: Model prediction test
      run: |
        python scripts/prediction_smoke_test.py

    - name: Performance baseline test
      run: |
        python scripts/performance_test.py
